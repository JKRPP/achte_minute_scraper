version: "3.8"
services:
  web:
    image: nginx:alpine
    container_name: motion-website
    ports:
      - "8085:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - default
      - proxy

networks:
  proxy:
    name: ${PROXY_NETWORK}
    external: true
